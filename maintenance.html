<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADTEM — Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f0;
  --surface: #ffffff;
  --border: #dde3d8;
  --green: #4a8c52;
  --green2: #3d7545;
  --green3: #2e5c35;
  --greenl: #d4e8d6;
  --greenbg: #eef6ef;
  --text: #1e2a1f;
  --text2: #4a5c4d;
  --text3: #7a907c;
  --text4: #a8baa9;
  --yellow: #c9860a;
  --yellowbg: #fef9ec;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text);
  overflow: hidden;
}

/* ── Fond animé léger ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(74,140,82,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(46,92,53,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Grille de fond ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(74,140,82,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,140,82,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  max-width: 520px;
  width: 90%;
}

/* ── Card principale ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 52px 48px 44px;
  text-align: center;
  box-shadow: 0 8px 48px rgba(0,0,0,0.08), 0 2px 12px rgba(74,140,82,0.06);
  width: 100%;
}

.logo {
  height: 72px;
  width: auto;
  object-fit: contain;
  margin: 0 auto 28px;
  display: block;
  filter: drop-shadow(0 2px 6px rgba(74,140,82,0.15));
}

/* ── Badge maintenance ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--yellowbg);
  border: 1px solid rgba(201,134,10,0.25);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--yellow);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 22px;
}

.badge-dot {
  width: 6px;
  height: 6px;
  background: var(--yellow);
  border-radius: 50%;
  animation: pulse 1.6s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  line-height: 1.2;
}

h1 span {
  color: var(--green);
}

.subtitle {
  font-size: 14px;
  color: var(--text3);
  line-height: 1.7;
  margin-bottom: 32px;
  max-width: 360px;
  margin-left: auto;
  margin-right: auto;
}

  100% { background-position: 200% 0; }
}

/* ── Slogan ── */
.slogan {
  font-size: 11px;
  font-style: italic;
  color: var(--text4);
  letter-spacing: 0.3px;
}

/* ── Footer ── */
.footer {
  margin-top: 24px;
  font-size: 11px;
  color: var(--text4);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.footer-sep {
  width: 1px;
  height: 10px;
  background: var(--text4);
  opacity: 0.4;
}

/* ── Bus animé ── */
.bus-track {
  width: 100%;
  height: 28px;
  margin: 24px 0 0;
  position: relative;
  overflow: hidden;
}

.bus-icon {
  position: absolute;
  font-size: 20px;
  top: 4px;
  animation: drive 6s linear infinite;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}

@keyframes drive {
  0%   { left: -40px; opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 1; }
  100% { left: calc(100% + 20px); opacity: 0; }
}

.track-line {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), var(--greenl), var(--border), transparent);
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <img
      src="https://raw.githubusercontent.com/ADTEM/Admin/main/assets/img/Logo%20Alliance.png"
      class="logo"
      crossorigin="anonymous"
      onerror="this.style.display='none'"
      alt="ADTEM">

    <div class="badge">
      <span class="badge-dot"></span>
      Maintenance en cours
    </div>

    <h1>Le site est en cours<br>de <span>mise à jour</span></h1>

    <p class="subtitle">
      L'alliance ADTEM procède à une maintenance.<br>
      Le service sera de retour très prochainement.
    </p>
    </div>

    <div class="bus-track">
      <div class="track-line"></div>
      <span class="bus-icon">🚌</span>
    </div>

    <p class="slogan">Aiguisons les limites et développons la mobilité de demain</p>

  </div>

  <div class="footer">
    <span>ADTEM</span>
    <span class="footer-sep"></span>
    <span>Transport Manager</span>
    <span class="footer-sep"></span>
    <span>Alliance Manager V1.10</span>
  </div>
</div>

</body>
</html>
